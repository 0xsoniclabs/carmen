name: Go

permissions:
  contents: read
  checks: write

on:
  push:
    branches: [ main ]
    paths:
       - ".github/workflows/go.yaml"
       - "go/**"
  pull_request:
    branches: [ "**" ]
    paths:
       - ".github/workflows/go.yaml"
       - "go/**"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: checkout
      uses: actions/checkout@v4
    - name: setup go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26.0"
        cache-dependency-path: go/go.sum
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2
        working-directory: go