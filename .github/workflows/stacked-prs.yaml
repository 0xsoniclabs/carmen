name: PR

permissions:
  contents: read
  checks: write

on:
  pull_request:
    branches: [ "**/**" ]

jobs:
  targets-main:
    name: targets S5
    runs-on: ubuntu-latest
    steps:
      - name: check PR targets S5
        env:
          TARGET_BRANCH: ${{ github.base_ref }}
        run: |
          if [ "$TARGET_BRANCH" == "S5" ]; then
            exit 0
          else
            echo "Stacked PRs can not be merged."
            exit 1
          fi
